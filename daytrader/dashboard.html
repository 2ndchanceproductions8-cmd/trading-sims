<!DOCTYPE html>
<html lang="en"><head><meta name="robots" content="noindex, nofollow"><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Day Trader Sim — Dashboard</title><style>
:root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#e6edf3;
        --muted:#8b949e; --green:#3fb950; --red:#f85149; --blue:#58a6ff;
        --amber:#d29922; --orange:#f0883e; }
* { box-sizing:border-box; }
body { background:var(--bg); color:var(--text); margin:0; padding:24px;
       font:15px/1.55 'Segoe UI',system-ui,sans-serif; max-width:1100px;
       margin-inline:auto; }
h1 { font-size:26px; margin:0; } h2 { font-size:19px; margin:34px 0 12px;
     border-bottom:1px solid var(--border); padding-bottom:6px; }
h3 { font-size:17px; margin:22px 0 8px; }
.card { background:var(--card); border:1px solid var(--border);
        border-radius:10px; padding:16px 18px; margin:10px 0; }
.grid { display:grid; gap:12px; } .g4 { grid-template-columns:repeat(4,1fr); }
.g2 { grid-template-columns:repeat(2,1fr); }
@media (max-width:800px){ .g4,.g2 { grid-template-columns:1fr; } }
.kpi .label { color:var(--muted); font-size:12px; text-transform:uppercase;
              letter-spacing:.06em; }
.kpi .value { font-size:26px; font-weight:700; margin-top:2px; }
.kpi .sub { color:var(--muted); font-size:13px; }
.pos { color:var(--green); } .neg { color:var(--red); } .mut { color:var(--muted); }
.badge { display:inline-block; padding:2px 10px; border-radius:999px;
         font-size:12px; font-weight:600; }
.b-buy { background:#1a3a26; color:var(--green); border:1px solid var(--green); }
.b-sell { background:#3d1d1d; color:var(--red); border:1px solid var(--red); }
.b-setup { background:#1b2a41; color:var(--blue); border:1px solid var(--blue); }
.b-half { background:#2d2306; color:var(--amber); border:1px solid var(--amber); }
table { width:100%; border-collapse:collapse; font-size:14px; }
th { color:var(--muted); text-align:left; font-weight:600; font-size:12px;
     text-transform:uppercase; letter-spacing:.05em; }
th,td { padding:7px 10px; border-bottom:1px solid var(--border); }
tr:last-child td { border-bottom:none; }
details { margin:8px 0; } summary { cursor:pointer; padding:10px 14px;
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
details[open] summary { border-radius:8px 8px 0 0; }
details .body { border:1px solid var(--border); border-top:none;
  border-radius:0 0 8px 8px; padding:14px 18px; background:#10151c; }
summary::-webkit-details-marker { display:none; }
.step { display:flex; gap:14px; } .step .num { flex:none; width:30px; height:30px;
  border-radius:50%; background:#1b2a41; color:var(--blue); display:flex;
  align-items:center; justify-content:center; font-weight:700; }
.track { position:relative; height:10px; border-radius:6px; margin:12px 0 4px;
  background:linear-gradient(90deg,var(--red) 0%,#444 32%,#444 34%,var(--green) 100%); }
.track .mark { position:absolute; top:-4px; width:4px; height:18px;
  background:#fff; border-radius:2px; }
.tlabels { display:flex; justify-content:space-between; color:var(--muted); font-size:12px; }
.halt { background:#3d1d1d; border:1px solid var(--red); color:var(--red);
        font-weight:700; padding:10px 16px; border-radius:8px; margin:14px 0; }
.halt .why { color:var(--text); font-weight:400; }
footer { color:var(--muted); font-size:13px; margin-top:40px;
         border-top:1px solid var(--border); padding-top:14px; }
svg text { fill:var(--muted); font-size:11px; paint-order:stroke;
           stroke:#0d1117; stroke-width:3px; stroke-linejoin:round; }
.banner { background:#10202e; border:2px solid var(--blue); border-radius:12px;
          padding:18px 22px; margin:16px 0; }
.banner.agg { border-color:var(--orange); background:#241a10; }
.banner-h { font-size:21px; font-weight:700; margin-bottom:8px; }
.nav { display:flex; gap:10px; margin:0 0 10px; }
.nav .tab { flex:1; display:flex; flex-direction:column; gap:2px; padding:12px 16px;
  border:1px solid var(--border); border-radius:10px; background:var(--card);
  color:var(--muted); font-weight:600; cursor:pointer; font:inherit; text-align:left; }
.nav .tab .t-eq { font-size:22px; font-weight:800; color:var(--text); }
.nav .tab:hover { border-color:var(--blue); }
.nav .tab.active.careful { border-color:var(--blue); background:#10202e; color:var(--text); }
.nav .tab.active.agg { border-color:var(--orange); background:#241a10; color:var(--text); }
.nav .tab.active.mkt { border-color:var(--blue); background:#10202e; color:var(--text); }
.verdict-keep { color:var(--green); font-weight:700; }
.verdict-watch { color:var(--amber); font-weight:700; }
.verdict-cut { color:var(--red); font-weight:700; }
.chartbox { position:relative; }
.tt { position:absolute; pointer-events:none; background:var(--card);
  border:1px solid var(--border); border-radius:6px; padding:5px 9px;
  font-size:12px; white-space:nowrap; display:none; z-index:5; }
ol.lesson { color:var(--muted); margin:10px 0 0; }
ol.lesson li { margin:6px 0; } ol.lesson b { color:var(--text); }
.simnote { color:var(--amber); font-weight:700; font-size:13px; }
a { color:var(--blue); text-decoration:none; } a:hover { text-decoration:underline; }
ul.news { list-style:none; padding:0; margin:6px 0; }
ul.news li { margin:6px 0; padding-left:2px; }
ul.news .s { display:inline-block; min-width:34px; font-size:12px; font-weight:700;
  margin-right:6px; text-align:center; border-radius:6px; padding:1px 6px; }
.s-pos { background:#1a3a26; color:var(--green); }
.s-neg { background:#3d1d1d; color:var(--red); }
.s-neu { background:#21262d; color:var(--muted); }
.mood { display:inline-block; padding:2px 12px; border-radius:999px; font-weight:700;
  font-size:13px; margin-left:8px; }
.mood.happy { background:#1a3a26; color:var(--green); }
.mood.sad { background:#3d1d1d; color:var(--red); }
.mood.meh { background:#21262d; color:var(--muted); }
</style></head>

e clock. Two things make crypto different: (1) at night and on weekends the crowd goes home, so moves lie \u2014 the careful bot bets half-size then; (2) the FEE MONSTER: crypto charges a toll going in AND out of every trade. Small wins get eaten whole. So the bot demands bigger wins, and flat-out refuses any trade where the toll would eat more than 15% of the risk slice.", "setups": [{"key": "SQUEEZE", "name": "\ud83c\udf00 SQUEEZE \u2014 the Coiled Spring", "what": "When the price gets squished into a super-quiet range (the tightest 20% of the whole day), it's a coiled spring. When it finally pops out of the quiet zone with a big crowd (1.5\u00d7 volume), jump on and ride the pop.", "why": "Crypto sleeps, then explodes \u2014 quiet stores up energy. The crowd confirms the pop is real. The careful bot also checks the 2-day tide and only rides pops going the SAME way \u2014 swimming against the tide is how the aggressive twin drowns.", "rules": ["\ud83d\ude23 Ouch line: 1.5 wiggle-sizes away (never closer than the fee monster allows)", "\ud83c\udf89 Win line: 2.5\u00d7 the ouch distance \u2014 fees demand bigger wins", "\ud83e\udd67 Up one slice? Sell half, ouch to break-even, chase the rest", "\u23f0 No pop within 2 hours? It was a dud \u2014 leave"]}, {"key": "RANGE_FADE", "name": "\ud83e\ude80 RANGE_FADE \u2014 the Rubber Band", "what": "When the market is asleep (trend meter under 18 = going nowhere) and the price stretches way too far from home then gets slapped back, bet that it snaps back to the middle.", "why": "In a sleeping market, big stretches are overreactions \u2014 like a rubber band, they snap back. But ONLY with a hard ouch line: the one time it's a real breakout, you must lose small.", "rules": ["\ud83d\ude23 Ouch line: one wiggle-size past the stretch", "\ud83c\udf89 Win line: the middle of the range (home)", "Skipped when the crowd surges \u2014 that's a real pop, not a stretch"]}]}};
const RISK = [["\ud83c\udf70 Only ever risk one small slice", "Before buying, the bot decides where the \ud83d\ude23 ouch line goes, then buys exactly enough shares so that hitting the ouch line costs about 1% of the piggy bank (3% for the \ud83d\udd25 aggressive twin). Feeling sure is a feeling, not a fact \u2014 so there is no way to bet bigger because it 'feels good'."], ["\ud83d\udccf Draw BOTH lines before you buy \u2014 then obey them", "\ud83d\ude23 Ouch line = 'I was wrong, get out now.' \ud83c\udf89 Win line = at least 1.5\u20132.5\u00d7 further away than the ouch line. The bot obeys the lines every single time. No feelings, no 'maybe it comes back'."], ["\ud83e\udd67 Up one slice? Take half off the table", "The moment a trade is up as much as it risked, the bot sells HALF and moves the ouch line up to the buy price. Worst case is now break-even \u2014 the rest of the ride is free candy."], ["\ud83d\uded1 Bad day? The bot benches itself", "Lose 3 slices in one day, or 3 trades in a row, and the bot stops until tomorrow (the aggressive twin gets 6 slices / 5 in a row). Chasing losses is the #1 way piggy banks die, so chasing is simply not allowed to exist."], ["\u23f0 If nothing happens, leave", "A breakout that goes nowhere was a false alarm. Out after ~45 minutes on stocks, 2 hours on crypto. Dead trades tie up the piggy bank and the attention. And stocks are ALWAYS sold by 3:55 \u2014 never held overnight."], ["\ud83e\uddfe Never feed the fee monster (crypto)", "Every crypto trade pays a toll in AND out. If the toll would eat more than 15% of the risk slice, the trade is refused \u2014 no matter how pretty the chart looks. The first version of this bot ignored fees and every small loss quietly became a 60% bigger one. Lesson learned, rule added."]];
const V2 = {"stocks": [["\ud83d\udd70\ufe0f Dip-buys moved out of the morning chop", "In v1 the careful bot bought VWAP dips between 9:45\u201311:30 \u2014 right in the opening argument, where the play won only 14% of the time and leaked -5.2 slices. The exact same play won 67% when taken later in the day. v2 careful only buys dips after 11:30, once the day has actually picked a direction."], ["\ud83c\udfc3 Winners are allowed to RUN", "v1 sold half at +1 slice, slammed the stop to break-even instantly, and trailed so tight the best trade ever was ~1.5 slices \u2014 while losses were a full slice. You can't win a coin-flip game where heads pays less than tails costs. v2 banks only a third at +1, waits for +1.25 before break-even, and trails 2.5 wiggle-sizes so real winners can reach the win line."]], "crypto": [["\ud83c\udf0a NO more swimming against the tide", "v1 aggressive was allowed to take breakouts AGAINST the 2-day trend. That one permission lost ~-10 slices by itself. v2 keeps the 3x bet size but both v2 bots must trade WITH the tide."], ["\u2b07\ufe0f\ud83d\udd12 Shorts need double proof", "Betting DOWN was the single biggest money-loser (-18 slices across both v1 bots). v2 only shorts when BOTH the fast trend and the 2-day trend point down \u2014 no more shorting dips in a rising market."], ["\ud83c\udfaf Buy at the door, not down the hall", "v1 waited for a breakout bar to fully CLOSE outside the quiet zone, then chased it \u2014 entering ~0.3 slices late every time. v2 places a stop-order at the edge of the zone and gets filled where the breakout actually starts."], ["\ud83c\udfc3 Winners are allowed to RUN", "Same exit fix as stocks: bank a third (not half) at +1 slice, break-even waits for +1.25, trail loosened to 2.5 wiggle-sizes. With crypto's fee monster, small truncated wins never had a chance."], ["\ud83e\ude80 Rubber-band play retired", "The range-fade fired once in 58 v1 trades \u2014 the fee floor makes its targets untradeable. Deleted in v2 instead of pretending it helps."]]};
let MARKET = "stocks", PROFILE = "careful";

const fmt$ = n => (n<0?"-$":"$") + Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtR = n => (n>=0?"+":"") + n.toFixed(2) + " slices";
const cls  = n => n>=0 ? "pos" : "neg";
const esc  = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");

const EXITS = {
  stop: t => t.scaled_out
    ? "😌 It came back and touched the moved-up ouch line — but half was already sold at the win-half point, so the trade still ended fine. That's the free-ride rule working."
    : "😣 It touched the ouch line, so the bot sold instantly. A small loss, on purpose — no waiting, no hoping, no 'maybe it comes back'. That's the seatbelt doing its job.",
  target: () => "🎉 It reached the win line! Sold and smiled. Greed is how wins turn back into losses, so the bot takes the win and walks away.",
  time_stop: () => "⏰ Nothing happened for too long, so the bot left with a tiny scratch instead of sitting there waiting to get hurt. A breakout that goes nowhere was a false alarm.",
  eod_flat: () => "🌙 The 3:55 rule — the day is over, everything gets sold, the bot goes home flat. It never sleeps holding stocks.",
  replay_end: () => "📼 The replay tape ran out, so the position was closed at the last price on the tape.",
  session_end: () => "Session ended — position closed.",
};

function navs(){
  const mk = (m,label) => {
    const on = MARKET===m ? "active mkt" : "";
    return `<button class="tab ${on}" onclick="MARKET='${m}';render()"><span>${label}</span></button>`;
  };
  document.getElementById("nav-market").innerHTML =
    mk("stocks","📈 Stock Bot") + mk("crypto","🪙 Crypto Bot");
  const pk = (p,label,klass) => {
    const d = DATA[MARKET][p];
    const eq = d ? fmt$(d.ending_equity) : "no data";
    const on = PROFILE===p ? "active "+klass : "";
    return `<button class="tab ${klass} ${on}" onclick="PROFILE='${p}';render()"><span>${label}</span><span class="t-eq">${eq}</span></button>`;
  };
  document.getElementById("nav-profile").innerHTML =
    pk("careful","🛡️ Careful v1","careful") +
    pk("careful_v2","🛡️🧪 Careful v2","careful") +
    pk("aggressive","🔥 Aggressive v1","agg") +
    pk("aggressive_v2","🔥🧪 Aggressive v2","agg");
}

const isAgg = () => PROFILE.startsWith("aggressive");
const isV2  = () => PROFILE.endsWith("_v2");
const botName = () => (isAgg()?"aggressive twin":"careful bot") + (isV2()?" (v2)":"");

function banner(d){
  const s = d.stats, agg = isAgg();
  const box = h => `<div class="banner ${agg?"agg":""}">${h}</div>`;
  if(!s.n) return box(`<div class="banner-h">✋ The bot did nothing</div>
    <p class="mut">No setup passed all the rules during this replay, so it never traded.
    That's not broken — <b>not trading a bad market IS the strategy.</b> Most of the
    skill of trading is sitting on your hands.</p>`);
  const pnl = s.net_pnl;
  let head, body;
  if (pnl > 0){
    head = `🎉 The ${botName()} made ${fmt$(pnl)} on this replay`;
    body = `It was right ${s.win_rate.toFixed(0)}% of the time. That's the trick most
      people miss: you don't need to be right a lot — you need your wins
      (avg ${fmtR(s.avg_win_r)}) to out-size your losses (avg ${fmtR(s.avg_loss_r)}).
      <span class="simnote">One good run proves very little — judge it over months.</span>`;
  } else {
    head = `😣 The ${botName()} lost ${fmt$(-pnl)} on this replay — now look at the loss SIZES`;
    body = `Every loss stayed close to one slice (worst single trade:
      ${fmtR(s.worst_r)}). Losing small on a bad stretch is the whole game —
      a losing week with tiny, controlled losses means the seatbelts work.
      Amateur accounts don't die from losing weeks; they die from ONE huge loss.`;
  }
  let verdicts = `<p style="margin:16px 0 4px"><b>Report card — should each play stay in the playbook?</b></p>
    <table><tr><th>Play</th><th>Tries</th><th>Right</th><th>Result</th><th>Verdict</th></tr>`;
  for (const [k,ps] of Object.entries(d.per_setup)){
    const doc = (DOCS[MARKET].setups.find(x=>x.key===k)||{name:k});
    let v;
    if (ps.expectancy_r > 0.05) v = `<span class="verdict-keep">KEEP — it's paying</span>`;
    else if (ps.expectancy_r > -0.15) v = `<span class="verdict-watch">WATCH — about break-even</span>`;
    else v = `<span class="verdict-cut">CUT candidate — it's leaking</span>`;
    verdicts += `<tr><td><b>${doc.name.split("—")[0].trim()}</b></td><td>${ps.n}</td>
      <td>${ps.win_rate.toFixed(0)}%</td>
      <td class="${cls(ps.total_r)}">${fmtR(ps.total_r)}</td><td>${v}</td></tr>`;
  }
  verdicts += `</table><p class="mut" style="margin-top:12px">This report card is the
    real secret weapon: measure every play, cut the ones that leak, keep the ones
    that pay. That loop — not predicting the future — is what good traders actually do.</p>`;
  return box(`<div class="banner-h">${head}</div><p class="mut">${body}</p>${verdicts}`);
}

function kpis(d){
  const s = d.stats; if(!s.n) return "";
  const eqD = d.ending_equity - d.starting_equity;
  return `<div class="grid g4">
   <div class="card kpi"><div class="label">Piggy bank (simulated)</div>
     <div class="value">${fmt$(d.ending_equity)}</div>
     <div class="sub">started ${fmt$(d.starting_equity)}</div></div>
   <div class="card kpi"><div class="label">Made or lost</div>
     <div class="value ${cls(eqD)}">${fmt$(eqD)}</div>
     <div class="sub ${cls(s.total_r)}">${fmtR(s.total_r)}</div></div>
   <div class="card kpi"><div class="label">How often it was right</div>
     <div class="value">${s.win_rate.toFixed(0)}%</div>
     <div class="sub">win ${fmtR(s.avg_win_r)} · loss ${fmtR(s.avg_loss_r)}</div></div>
   <div class="card kpi"><div class="label">Worst slump</div>
     <div class="value neg">${s.max_dd_pct.toFixed(1)}%</div>
     <div class="sub">${s.n} trades total</div></div>

}

function rules(){
  return `<h2>🧒 The whole game in ${RISK.length} rules</h2><div class="grid g2">` +
    RISK.map(([t,x],i)=>`<div class="card step"><div class="num">${i+1}</div>
      <div><b>${t}</b><br><span class="mut">${x}</span></div></div>`).join("") + `</div>`;
}

function tradeChart(t, H, callouts){
  const c = t.chart; if(!c || c.closes.length<2) return "";
  const W=1000, P={l:60,r:170,t:30,b:26};
  const ys=[...c.closes, t.stop0, t.target];
  let lo=Math.min(...ys), hi=Math.max(...ys);
  const pad=(hi-lo)*0.08||0.01; lo-=pad; hi+=pad;
  const X=i=>P.l+(W-P.l-P.r)*i/(c.closes.length-1);
  const Y=v=>P.t+(H-P.t-P.b)*(1-(v-lo)/(hi-lo));
  const line=c.closes.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const yS=Y(t.stop0), yT=Y(t.target);
  const xe=X(c.i_entry), ye=Y(c.closes[c.i_entry]);
  const xx=X(Math.min(c.i_exit,c.closes.length-1)), yx=Y(c.closes[Math.min(c.i_exit,c.closes.length-1)]);
  const n = i => callouts ? "①②③④"[i] + " " : "";
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <line x1="${P.l}" y1="${yS}" x2="${W-P.r}" y2="${yS}" stroke="var(--red)" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="${W-P.r+8}" y="${yS+4}" fill="#f85149">${n(2)}😣 ouch line ${fmt$(t.stop0)}</text>
    <line x1="${P.l}" y1="${yT}" x2="${W-P.r}" y2="${yT}" stroke="var(--green)" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="${W-P.r+8}" y="${yT+4}" fill="#3fb950">${n(3)}🎉 win line ${fmt$(t.target)}</text>
    <polyline points="${line}" fill="none" stroke="var(--blue)" stroke-width="2.5"/>
    <circle cx="${xe}" cy="${ye}" r="6" fill="#0d1117" stroke="#e6edf3" stroke-width="3"/>
    <text x="${xe-10}" y="${ye-12}" text-anchor="end" fill="#e6edf3" font-weight="bold">${n(0)}🛒 ${t.side==="long"?"bought":"shorted"} here ${fmt$(t.entry)}</text>
    <circle cx="${xx}" cy="${yx}" r="6" fill="#0d1117" stroke="${t.r>=0?"#3fb950":"#f85149"}" stroke-width="3"/>
    <text x="${xx+10}" y="${yx-12}" fill="${t.r>=0?"#3fb950":"#f85149"}" font-weight="bold">${n(1)}🏁 out here</text>
    <text x="${P.l}" y="${H-6}">${c.t0}</text>
    <text x="${W-P.r}" y="${H-6}" text-anchor="end">${c.t1}</text>
  </svg>`;
}

function lesson(d){
  const withCharts = d.trades.filter(t=>t.chart);
  if(!withCharts.length) return "";
  const best = [...withCharts].sort((a,b)=>b.r-a.r)[0];
  const won = best.r > 0;
  return `<h2>📖 Lesson chart — one real trade, with the strategy drawn on it</h2>
  <div class="card">
    <b style="font-size:17px">${best.symbol}</b>
    <span class="badge ${best.side==="long"?"b-buy":"b-sell"}">${best.side==="long"?"LONG ⬆ betting up":"SHORT ⬇ betting down"}</span>
    <span class="badge b-setup">${best.setup}</span>
    <span style="float:right;font-size:17px;font-weight:700" class="${cls(best.r)}">${fmtR(best.r)} · ${fmt$(best.pnl)}</span>
    ${tradeChart(best, 340, true)}
    <ol class="lesson">
      <li><b>①</b> The white dot is where the bot got in — and here's why:
          <i>${esc(best.rationale)}</i></li>
      <li><b>②</b> The 🏁 dot is where it got out. ${EXITS[best.reason]?EXITS[best.reason](best):best.reason}</li>
      <li><b>③</b> The red dashed line is the <b>😣 ouch line</b> — drawn BEFORE
          entering. Touch it → sell instantly, lose one small slice, move on.
          It was placed exactly where the trade's idea would be proven wrong.</li>
      <li><b>④</b> The green dashed line is the <b>🎉 win line</b> — at least
          ${best.target_r?best.target_r.toFixed(1):"2"}× further than the ouch line.
          That gap is the whole business model: small ouches, bigger wins.
          ${won?"This time it worked.":"This time it didn't — and that's fine, because the ouch stayed small."}</li>
    </ol>
  </div>`;
}

function compare(){
  const c=DATA[MARKET].careful, a=DATA[MARKET].aggressive;
  if(!c||!a) return "";
  const row=(emoji,name,d)=>{
    const eqD=d.ending_equity-d.starting_equity, s=d.stats;
    return `<tr><td><b>${emoji} ${name}</b></td>
      <td class="${cls(eqD)}">${fmt$(eqD)}</td>
      <td>${s.n?s.win_rate.toFixed(0)+"%":"—"}</td>
      <td class="neg">${s.n?s.max_dd_pct.toFixed(1)+"%":"—"}</td>
      <td>${s.n||0}</td><td>${d.halts.length}</td></tr>`;
  };
  const c2=DATA[MARKET].careful_v2, a2=DATA[MARKET].aggressive_v2;
  return `<h2>⚔️ Careful vs Aggressive — same brain, different courage</h2>
  <div class="card"><table>
    <tr><th>Bot</th><th>Made / lost</th><th>Right</th><th>Worst slump</th><th>Trades</th><th>Benched</th></tr>
    ${row("🛡️","Careful v1",c)}${c2?row("🛡️🧪","Careful v2",c2):""}
    ${row("🔥","Aggressive v1",a)}${a2?row("🔥🧪","Aggressive v2",a2):""}</table>
  <p class="mut" style="margin-top:12px">They see the exact same charts and take the
  same kinds of trades. The twin just bets 3× bigger slices, takes more trades, and
  wears fewer seatbelts. Watch the <b>worst slump</b> column — that's the real price
  of courage: same ideas, deeper holes. A deep hole is dangerous because climbing out
  is harder than falling in: lose 10% and you need +11% to get back; lose 50% and
  you need +100%.</p></div>`;
}

function upgradeLab(){
  const base = PROFILE.replace("_v2","");
  const d1 = DATA[MARKET][base], d2 = DATA[MARKET][base+"_v2"];
  if(!d1 || !d2) return "";
  const s1 = d1.stats, s2 = d2.stats;
  const agg = isAgg();
  const name = agg ? "aggressive twin" : "careful bot";

  // metric rows: label, v1 value, v2 value, delta (better = green)
  const pnl1 = d1.ending_equity-d1.starting_equity, pnl2 = d2.ending_equity-d2.starting_equity;
  const met = (label, v1, v2, d, dCls, note) => `<tr><td class="mut">${label}</td>
    <td>${v1}</td><td><b>${v2}</b></td>
    <td class="${dCls}" style="font-weight:700">${d}</td>
    <td class="mut" style="font-size:12px">${note||""}</td></tr>`;
  const dd = (a,b,fmt,invert) => {
    const diff = b-a, good = invert ? diff<0 : diff>0;
    return [ (diff>=0?"+":"")+fmt(diff), good?"pos":(diff===0?"":"neg") ];
  };
  let rows = "";
  { const [t,c]=dd(pnl1,pnl2,n=>fmt$(n).replace("$-","-$"));
    rows += met("💰 Made / lost", `<span class="${cls(pnl1)}">${fmt$(pnl1)}</span>`,
                `<span class="${cls(pnl2)}">${fmt$(pnl2)}</span>`, t, c,
                "the bottom line"); }
  if (s1.n && s2.n){
    { const [t,c]=dd(s1.win_rate,s2.win_rate,n=>n.toFixed(0)+"%");
      rows += met("🎯 How often right", s1.win_rate.toFixed(0)+"%", s2.win_rate.toFixed(0)+"%", t, c); }
    { const [t,c]=dd(s1.avg_win_r,s2.avg_win_r,n=>n.toFixed(2));
      rows += met("🏆 Average win", fmtR(s1.avg_win_r), fmtR(s2.avg_win_r), t, c,
                  "the exit fix should show up here"); }
    { const [t,c]=dd(s1.avg_loss_r,s2.avg_loss_r,n=>n.toFixed(2));
      rows += met("😣 Average loss", fmtR(s1.avg_loss_r), fmtR(s2.avg_loss_r), t, c); }
    { const [t,c]=dd(s1.expectancy_r,s2.expectancy_r,n=>n.toFixed(2));
      rows += met("🧮 Edge per trade", fmtR(s1.expectancy_r), fmtR(s2.expectancy_r), t, c,
                  "above zero = the game is worth playing"); }
    { const [t,c]=dd(s1.max_dd_pct,s2.max_dd_pct,n=>n.toFixed(1)+"%");
      rows += met("🕳️ Worst slump", s1.max_dd_pct.toFixed(1)+"%", s2.max_dd_pct.toFixed(1)+"%", t, c,
                  "closer to zero = shallower hole"); }
    rows += met("🛒 Trades taken", s1.n, s2.n, (s2.n-s1.n>=0?"+":"")+(s2.n-s1.n), "",
                "fewer can be BETTER — skipped leaks");
  }

  // per-play comparison across the union of setups
  const keys = [...new Set([...Object.keys(d1.per_setup), ...Object.keys(d2.per_setup)])];
  let plays = "";
  for (const k of keys){
    const a = d1.per_setup[k], b = d2.per_setup[k];
    const doc = (DOCS[MARKET].setups.find(x=>x.key===k)||{name:k});
    const cell = ps => ps
      ? `<td>${ps.n} tries · ${ps.win_rate.toFixed(0)}% · <span class="${cls(ps.total_r)}">${fmtR(ps.total_r)}</span></td>`
      : `<td class="mut">— retired</td>`;
    plays += `<tr><td><b>${doc.name.split("—")[0].trim()}</b></td>${cell(a)}${cell(b)}</tr>`;
  }

  // overlaid equity curves — v1 ghost, v2 solid
  let chart = "";
  const p1 = d1.equity_curve, p2 = d2.equity_curve;
  if (p1.length>1 && p2.length>1){
    const W=1000,H=280,P={l:64,r:16,t:16,b:26};
    const ys=[...p1.map(p=>p[1]),...p2.map(p=>p[1]),d1.starting_equity];
    let lo=Math.min(...ys), hi=Math.max(...ys);
    const pad=(hi-lo)*0.08||1; lo-=pad; hi+=pad;
    const Y=v=>P.t+(H-P.t-P.b)*(1-(v-lo)/(hi-lo));
    const line=(pts)=>pts.map((p,i)=>`${(P.l+(W-P.l-P.r)*i/(pts.length-1)).toFixed(1)},${Y(p[1]).toFixed(1)}`).join(" ");
    let grid="";
    for(let g=0;g<=4;g++){
      const v=lo+(hi-lo)*g/4, y=Y(v);
      grid+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#21262d"/>
             <text x="${P.l-8}" y="${y+4}" text-anchor="end">$${Math.round(v).toLocaleString()}</text>`;
    }
    const yb=Y(d1.starting_equity);
    chart = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
      ${grid}
      <line x1="${P.l}" y1="${yb}" x2="${W-P.r}" y2="${yb}" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="4 4"/>
      <polyline points="${line(p1)}" fill="none" stroke="#8b949e" stroke-width="2" stroke-dasharray="6 4" opacity="0.9"/>
      <polyline points="${line(p2)}" fill="none" stroke="${agg?"var(--orange)":"var(--green)"}" stroke-width="2.5"/>
      <text x="${P.l}" y="${H-6}">${p2[0][0].slice(0,10)}</text>
      <text x="${W-P.r}" y="${H-6}" text-anchor="end">${p2[p2.length-1][0].slice(0,10)}</text>
      <text x="${W-P.r}" y="${P.t+14}" text-anchor="end" fill="#8b949e">- - v1 original</text>
      <text x="${W-P.r}" y="${P.t+32}" text-anchor="end" fill="${agg?"var(--orange)":"var(--green)"}">— v2 improved</text>
    </svg>`;
  }

  const better = pnl2 > pnl1;
  const head = better
    ? `🧪 The Upgrade Lab — v2 made the ${name} ${fmt$(pnl2-pnl1)} better on this replay`
    : `🧪 The Upgrade Lab — v2 did NOT beat v1 on this replay (${fmt$(pnl2-pnl1)})`;
  const verdictNote = better
    ? "Same market, same replay window, same risk appetite — only the rules below changed."
    : "Same market, same replay window — v2 isn't magic, it's a hypothesis. If it keeps losing to v1 across many replays, the changes get cut, exactly like a leaking play.";

  return `<h2>${head.split("—")[0]}</h2>
  <div class="banner ${agg?"agg":""}">
    <div class="banner-h">${head}</div>
    <p class="mut">${verdictNote} Both versions run fresh on every update, on the exact
    same days of data — so this section is a fair, side-by-side experiment.</p>

    <p style="margin:16px 0 4px"><b>🔧 What v2 changes${MARKET==="stocks"?" (stocks)":" (crypto)"}</b></p>
    ${(V2[MARKET]||[]).map(([t,x])=>`<div class="card step" style="margin:8px 0"><div><b>${t}</b><br><span class="mut">${x}</span></div></div>`).join("")}

    <p style="margin:16px 0 4px"><b>📊 Scoreboard — v1 vs v2, same days, same money</b></p>
    <table><tr><th></th><th>v1 original</th><th>v2 improved</th><th>change</th><th></th></tr>${rows}</table>

    <p style="margin:16px 0 4px"><b>🃏 Play by play</b></p>
    <table><tr><th>Play</th><th>v1 original</th><th>v2 improved</th></tr>${plays}</table>

    ${chart?`<p style="margin:16px 0 4px"><b>📉 Both piggy banks, same days</b></p>${chart}`:""}
    <p class="mut" style="margin-top:10px;font-size:12px">One replay window is a small
    sample — a real verdict needs v2 to keep winning across many refreshes. That's the
    honest rule this whole dashboard lives by.</p>
  </div>`;
}

function equityChart(d){
  const pts = d.equity_curve;
  if (pts.length < 2) return "";
  const W=1000,H=260,P={l:64,r:16,t:16,b:26};
  const ys = pts.map(p=>p[1]);
  let lo=Math.min(...ys,d.starting_equity), hi=Math.max(...ys,d.starting_equity);
  const pad=(hi-lo)*0.08||1; lo-=pad; hi+=pad;
  const X=i=>P.l+(W-P.l-P.r)*i/(pts.length-1);
  const Y=v=>P.t+(H-P.t-P.b)*(1-(v-lo)/(hi-lo));
  const line=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p[1]).toFixed(1)}`).join(" ");
  let grid="";
  for(let g=0;g<=4;g++){
    const v=lo+(hi-lo)*g/4, y=Y(v);
    grid+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#21262d" stroke-width="1"/>
           <text x="${P.l-8}" y="${y+4}" text-anchor="end">$${Math.round(v).toLocaleString()}</text>`;
  }
  const yb=Y(d.starting_equity);
  return `<h2>📉 The piggy bank, hour by hour</h2><div class="card chartbox">
  <svg id="eq" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" data-lo="${lo}" data-hi="${hi}">
    ${grid}
    <line x1="${P.l}" y1="${yb}" x2="${W-P.r}" y2="${yb}" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="${W-P.r}" y="${yb-6}" text-anchor="end">where it started</text>
    <polyline points="${line}" fill="none" stroke="var(--blue)" stroke-width="2.5"/>
    <line id="xh" x1="0" x2="0" y1="${P.t}" y2="${H-P.b}" stroke="#30363d" style="display:none"/>
    <circle id="dot" r="4" fill="var(--blue)" stroke="#0d1117" stroke-width="2" style="display:none"/>
    <text x="${P.l}" y="${H-6}">${pts[0][0].slice(0,10)}</text>
    <text x="${W-P.r}" y="${H-6}" text-anchor="end">${pts[pts.length-1][0].slice(0,10)}</text>
  </svg><div class="tt" id="tt"></div>
  <p class="mut" style="margin:8px 0 0">Move your mouse along the line. Every stair-step
  down is a small controlled ouch; steps up are wins and half-wins.</p></div>`;
}

function hookChart(d){
  const svg=document.getElementById("eq"); if(!svg) return;
  const pts=d.equity_curve, tt=document.getElementById("tt"),
        xh=document.getElementById("xh"), dot=document.getElementById("dot");
  const W=1000,P={l:64,r:16,t:16,b:26},H=260;
  const lo=+svg.dataset.lo, hi=+svg.dataset.hi;
  svg.addEventListener("mousemove",e=>{
    const r=svg.getBoundingClientRect();
    const fx=(e.clientX-r.left)/r.width*W;
    let i=Math.round((fx-P.l)/(W-P.l-P.r)*(pts.length-1));
    i=Math.max(0,Math.min(pts.length-1,i));
    const x=P.l+(W-P.l-P.r)*i/(pts.length-1);
    const y=P.t+(H-P.t-P.b)*(1-(pts[i][1]-lo)/(hi-lo));
    xh.setAttribute("x1",x);xh.setAttribute("x2",x);xh.style.display="block";
    dot.setAttribute("cx",x);dot.setAttribute("cy",y);dot.style.display="block";
    tt.style.display="block";
    tt.style.left=Math.min(e.clientX-r.left+14,r.width-160)+"px";
    tt.style.top=(e.clientY-r.top-36)+"px";
    tt.innerHTML=`<b>${fmt$(pts[i][1])}</b> · ${pts[i][0]}`;
  });
  svg.addEventListener("mouseleave",()=>{tt.style.display="none";xh.style.display="none";dot.style.display="none";});
}

function plays(d){
  const doc = DOCS[MARKET];
  let h = `<h2>${doc.emoji} The playbook — how this bot hunts</h2>
    <div class="card mut">${doc.intro}</div>`;
  for (const s of doc.setups){
    const ps = d.per_setup[s.key];
    const perf = ps
      ? `<span class="mut" style="font-weight:400;font-size:13px"> · ${ps.n} tries, right ${ps.win_rate.toFixed(0)}%, ${fmtR(ps.total_r)}</span>`
      : `<span class="mut" style="font-weight:400;font-size:13px"> · no tries this run</span>`;
    h += `<div class="card"><h3 style="margin-top:0">${s.name}${perf}</h3>
      <p><b>The play:</b> <span class="mut">${s.what}</span></p>
      <p style="border-left:3px solid var(--blue);padding-left:12px"><b>Why it works:</b> <span class="mut">${s.why}</span></p>
      <ul class="mut" style="margin:8px 0 0;padding-left:20px">${s.rules.map(r=>`<li>${r}</li>`).join("")}</ul></div>`;
  }
  return h;
}

function halts(d){
  if(!d.halts.length) return "";
  return `<h2>🛑 Days the bot benched itself</h2>` +
    d.halts.map(h=>`<div class="halt">🛑 ${h.day} <span class="why">— stopped for the
      day: ${h.why}. No revenge trading allowed — it came back fresh the next day.</span></div>`).join("") +
    `<p class="mut">This looks like weakness. It's the strongest thing on this page.
    Real accounts die on the day someone tries to "win it back".</p>`;
}

function trades(d){
  if(!d.trades.length) return "";
  let h=`<h2>🛒 Every trade — and exactly why</h2>
  <p class="mut">Click any trade. You'll see the reason it was taken (in plain words),
  the chart with both lines drawn on, and how it ended.</p>`;
  for(const t of d.trades){
    const exit=(EXITS[t.reason]||(()=>t.reason))(t);
    const tr = t.target_r||2;
    const pct = Math.max(0, Math.min(1, (t.r+1)/(tr+1)))*100;
    h+=`<details><summary>
        <span class="mut">${t.opened}</span>
        <b>${t.symbol}</b>
        <span class="badge ${t.side==="long"?"b-buy":"b-sell"}">${t.side==="long"?"⬆ bet UP":"⬇ bet DOWN"}</span>
        <span class="badge b-setup">${t.setup}</span>
        ${t.scaled_out?`<span class="badge b-half">🥧 banked half</span>`:""}
        <span style="margin-left:auto;font-weight:700" class="${cls(t.r)}">${fmtR(t.r)} · ${fmt$(t.pnl)}</span></summary>
      <div class="body">
        <p><b>🧠 Why the bot took it:</b> <span class="mut">${esc(t.rationale)||"—"}</span></p>
        ${tradeChart(t, 260, false)}
        <div class="track"><div class="mark" style="left:calc(${pct.toFixed(1)}% - 2px)"></div></div>
        <div class="tlabels"><span>😣 full ouch (-1 slice)</span><span>🎉 win line (+${tr.toFixed(1)} slices)</span></div>
        <p><b>🏁 How it ended:</b> <span class="mut">${exit}</span></p>
        <p class="mut" style="font-size:12px">worst moment ${fmtR(t.mae_r)} · best moment ${fmtR(t.mfe_r)} · closed ${t.closed}</p>
      </div></details>`;
  }
  return h;
}

function newsItem(n){
  const k = n.score>0 ? "s-pos" : n.score<0 ? "s-neg" : "s-neu";
  const face = n.score>0 ? "😊" : n.score<0 ? "😞" : "😐";
  const title = n.link ? `<a href="${n.link}" target="_blank" rel="noopener">${esc(n.title)}</a>` : esc(n.title);
  return `<li><span class="s ${k}">${face} ${n.score>0?"+":""}${n.score}</span>${title}${n.source?` <span class="mut" style="font-size:12px">· ${n.source}</span>`:""}</li>`;
}

function mood(score){
  if (score >= 2)  return `<span class="mood happy">😊 happy ${"+"+score}</span>`;
  if (score <= -2) return `<span class="mood sad">😞 sad ${score}</span>`;
  return `<span class="mood meh">😐 mixed ${score>0?"+":""}${score}</span>`;
}

function news(){
  const nw = NEWS && NEWS[MARKET];
  if(!nw) return "";
  let h = `<h2>📰 What the stories say</h2>
  <div class="card"><p class="mut" style="margin-top:0">The bot counts <b>happy words</b>
  (beats, record, surge, upgrade…) against <b>sad words</b> (miss, lawsuit, crash,
  layoffs…) in each headline. This dashboard's bots trade the charts, not the news —
  but a top trader always knows the day's mood before the open: happy stories make
  breakouts stick, sad stories make them fail. Trading-scout uses this same score as
  a hard rule ("only buy when the happy words clearly win").</p>`;
  const t = nw.tickers || {};
  const rows = Object.entries(t).filter(([,v])=>v.items.length);
  if (rows.length){
    h += `<h3 style="margin-top:14px">Mood per name</h3><table>
      <tr><th>Name</th><th>Stories</th><th>Mood right now</th></tr>` +
      rows.map(([sym,v])=>`<tr><td><b>${sym}</b></td><td>${v.items.length}</td>
        <td>${mood(v.score)}</td></tr>`).join("") + `</table>`;
  }
  for (const [sym,v] of rows){
    h += `<details><summary><b>${sym}</b> ${mood(v.score)}
      <span class="mut" style="margin-left:auto;font-size:13px">${v.items.length} latest stories — click to read</span></summary>
      <div class="body"><ul class="news">${v.items.map(newsItem).join("")}</ul></div></details>`;
  }
  if (nw.market && nw.market.length){
    h += `<h3 style="margin-top:16px">The big ${MARKET==="stocks"?"market":"crypto"} headlines</h3>
      <ul class="news">${nw.market.map(newsItem).join("")}</ul>`;
  }
  h += `<p class="mut" style="font-size:12px">Headlines fetched ${NEWS.generated} ·
    Yahoo Finance / yfinance${MARKET==="crypto"?" · CoinDesk · Cointelegraph":" · CNBC · MarketWatch"} ·
    the score is simple word-counting, not a market oracle.</p></div>`;
  return h;
}

function settings(d){
  if(!d.meta.params) return "";
  return `<h2>⚙️ This bot's settings</h2><div class="card"><table>` +
    Object.entries(d.meta.params).map(([k,v])=>
      `<tr><td class="mut">${k}</td><td><b>${v}</b></td></tr>`).join("") +
    `</table>${d.fee_rejections?`<p class="mut" style="margin-top:10px">🧾 The fee
    monster gate refused <b>${d.fee_rejections}</b> trades this run — setups that
    looked fine but couldn't beat their own costs.</p>`:""}</div>`;
}

function render(){
  navs();
  const d = DATA[MARKET][PROFILE], v = document.getElementById("view");
  const agg = isAgg();
  document.getElementById("title").innerHTML =
    (agg?"🔥 Aggressive Twin":"🛡️ Careful Bot") + (isV2()?" 🧪 v2 (improved rules)":"") +
    ` <span class="mut" style="font-size:15px;font-weight:400">— ${MARKET==="stocks"?"stocks":"crypto"} · simulated ${d?fmt$(d.starting_equity):""}</span>`;
  if(!d){
    document.getElementById("meta").textContent="";
    v.innerHTML=`<div class="card mut">No data for this bot yet — double-click
      <b>Update &amp; View.bat</b> to run everything fresh.</div>`;
    return;
  }
  document.getElementById("meta").textContent =
    `${d.meta.universe.join(", ")} · ${d.meta.timeframe} · ${d.meta.span} · ${d.meta.source}`;
  v.innerHTML = banner(d) + kpis(d) + upgradeLab() + rules() + lesson(d) + news() +
                compare() + equityChart(d) + plays(d) + halts(d) + trades(d) + settings(d);
  hookChart(d);
}
render();
</script>
</body></html>
